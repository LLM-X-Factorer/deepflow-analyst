services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deepflow
      POSTGRES_PASSWORD: deepflow
      POSTGRES_DB: deepflow
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepflow -d deepflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://deepflow:deepflow@postgres:5432/deepflow
      APP_ENV: dev
    ports:
      - "8090:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    command:
      - uvicorn
      - deepflow_analyst.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src

volumes:
  postgres_data:
